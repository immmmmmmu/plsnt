name: scaffold-inventory
variables:
  # ⚠ 実行前の事前準備:
  #   1. Pleasanter Web UI で親フォルダ (Sites 型) を作成
  #   2. そのフォルダの SiteId を控える (URL の /items/N の N)
  #   3. 実行時に親 SiteId を指定:
  #        plsnt batch run     → --var folder_id=N
  #        plsnt workflow deploy → --folder-id N
  #
  # 理由: Pleasanter API は tenant root (parent_id=0) 直下のサイト作成を
  #       サポートしない（公式マニュアル example も ParentId=1 のみ）。
  #       https://pleasanter.org/en/manual/api-site-create
  folder_id: "0"
steps:
  - name: create-product-master
    command: site create
    args:
      parent-id: "{{folder_id}}"
      json: '{"Title":"商品マスタ","ReferenceType":"Results","SiteSettings":{"EditorColumnHash":{"General":["ClassA","ClassB","NumA","NumB"]},"Columns":[{"ColumnName":"ClassA","LabelText":"商品名"},{"ColumnName":"ClassB","LabelText":"カテゴリ"},{"ColumnName":"NumA","LabelText":"単価"},{"ColumnName":"NumB","LabelText":"在庫数"}]}}'

  - name: create-stock-movement
    command: site create
    args:
      parent-id: "{{folder_id}}"
      json: '{"Title":"入出庫","ReferenceType":"Issues","SiteSettings":{"EditorColumnHash":{"General":["ClassA","ClassB","NumA","DateA","Status"]},"Columns":[{"ColumnName":"ClassA","LabelText":"商品"},{"ColumnName":"ClassB","LabelText":"入出庫区分"},{"ColumnName":"NumA","LabelText":"数量"},{"ColumnName":"DateA","LabelText":"日付"}]}}'
    depends_on: [create-product-master]
